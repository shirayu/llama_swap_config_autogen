models:
  - /opt/data/llm/models
  # Expected layout under each directory:
  #   <model>/*.gguf
  #   <model>/<variant>/*.gguf
  # Any .gguf outside those depths will raise an error.

default_ttl: 300
healthCheckTimeout: 240
logLevel: warn
startPort: 9091
vram_estimation: true
captureBuffer: 0

# llama-swap official routing / groups (optional)
# groups:
#   default-group:
#     swap: true
#     exclusive: true
#     members:
#       - "deepseek-r1-distill-qwen-32b/distill:Q4_K_M"
#       - "glm-4.7/flash:Q4_K_M"

# llama-swap hooks (optional)
# hooks:
#   on_startup:
#     preload:
#       - "deepseek-r1-distill-qwen-32b/distill:Q4_K_M"

mmproj:
  enabled: true
  auto_attach: true
  arg: --mmproj
  generate_no_mmproj_variant: false
  no_mmproj_suffix: ' (no mmproj)'
  overrides: {}

model_labels:
  mmproj_default: ' 🌐'
  rules:
    - pattern: qwen-vl
      label: ' 👁️'
      requires_mmproj: true
    - pattern: qwen3-vl
      label: ' 👁️'
      requires_mmproj: true
    - pattern: glm-4.6v
      label: ' 👁️'
      requires_mmproj: true
    - pattern: gemma-3
      label: ' 👁️'
      requires_mmproj: true
    - pattern: gemma-4
      label: ' 👁️'
      requires_mmproj: true
    - pattern: small-3.2
      label: ' 👁️'
      requires_mmproj: true
    - pattern: whisper
      label: ' 🎧'
    - pattern: kokoro
      label: ' 🔊'

macros:
  # Runtime
  binary: /app/llama-server

  # Shared parts: base
  common-base: --jinja --cache-type-k q8_0 --cache-type-v q8_0 --flash-attn on
  default-params: ${common-base} ${layers-default} ${context-default}
  reasoning-base: ${default-params} --reasoning-format none

  # Shared parts: context
  context-short: --ctx-size 4096
  context-medium: --ctx-size 32768
  context-large: --ctx-size 65536
  context-ultra: --ctx-size 131072
  context-full: -c 0
  context-default: ${context-medium}

  # Shared parts: layers
  layers-mini: --n-gpu-layers 13
  layers-medium: --n-gpu-layers 25
  layers-full: --n-gpu-layers 999
  layers-default: ${layers-full}

  # Shared parts: CPU offload
  cpu-offload-ffn-full: -ot '.*.ffn_.*_exps.=CPU'
  cpu-offload-moe-max: --cpu-moe
  cpu-offload-moe-6: --n-cpu-moe 6
  cpu-offload-moe-12: --n-cpu-moe 12
  cpu-offload-moe-24: --n-cpu-moe 24
  cpu-offload-moe-36: --n-cpu-moe 36
  cpu-offload-moe-default: ${cpu-offload-moe-12}
  cpu-offload-threads: --threads 16
  cpu-offload-default: ${cpu-offload-moe-default} ${cpu-offload-threads}

  # Shared parts: sampling / memory / throughput
  temp-reasoning: --temp 0.7 --top-p 0.9
  temp-coding: --temp 0.1
  low-memory: --no-mmap --mlock
  memory-efficient: --cache-type-k q4_0 --cache-type-v q4_0
  inference-fast: --batch-size 512 --ubatch-size 512

  # Presets
  deepseek-r1-params: ${reasoning-base} ${temp-reasoning}
  gemma-large-params: ${default-params} ${layers-medium} ${context-medium}
  gemma-4-32k-q8-on-params: ${common-base} ${layers-full} ${context-medium}
  gemma-4-32k-q8-off-params: ${gemma-4-32k-q8-on-params} --reasoning off
  gemma-4-64k-kv-q4-off-params: ${common-base} ${layers-full} ${context-large} --cache-type-k q4_0 --cache-type-v q4_0 --reasoning off
  gemma-4-128k-kv-q4-off-params: ${common-base} ${layers-full} ${context-ultra} --cache-type-k q4_0 --cache-type-v q4_0 --reasoning off
  glm-47-params: ${default-params} --repeat-penalty 1.0 --temp 1.0
  gpt-oss-20b-params: ${reasoning-base} -c 0 -fa
  gpt-oss-120b-params: ${reasoning-base} ${layers-mini} --ctx-size 16384 --no-mmap
  qwen-context-large-params: ${default-params} ${context-large}
  qwen-coder-params: ${default-params} ${temp-coding} ${context-medium}
  qwen-cpu-params: ${default-params} ${cpu-offload-default} ${context-large}
  qwen-cpu-params-big: ${default-params} --n-gpu-layers 15 ${cpu-offload-default} ${context-large}

  # Utility presets
  short-ctx-params: ${default-params} ${context-short}
  long-context-params: ${default-params} ${context-large}
  memory-constrained-params: ${default-params} ${low-memory} ${memory-efficient}
  thinking-off-params: ${default-params} --reasoning off
  glm-47-thinking-off-params: ${glm-47-params} --reasoning off

model_patterns:
  r1-distill-qwen-32b: deepseek-r1-params
  Phi-3: memory-constrained-params
  qwen3-30b/instruct-2507: qwen-context-large-params
  qwen3-30b/coder-instruct: qwen-coder-params
  qwen3-next-80b: qwen-context-large-params
  StarCoder: qwen-coder-params
  TinyLlama: memory-constrained-params
  gemma-3-27b: gemma-large-params
  gemma-4-:
    macro: gemma-4-32k-q8-off-params
    emit_base: false
  glm-4.7/flash: glm-47-params
  gpt-oss-120b: gpt-oss-120b-params
  gpt-oss-20b: gpt-oss-20b-params

variants:
  - base_pattern: gemma-3-27b
    suffix: ' (Memory Efficient)'
    macro: memory-constrained-params
  - base_pattern: gemma-3-27b/it-qat
    suffix: ' (short ctx)'
    macro: short-ctx-params
  - base_pattern: gemma-4-
    suffix: ' (32k q8 off)'
    macro: gemma-4-32k-q8-off-params
  - base_pattern: gemma-4-
    suffix: ' (64k q4 off)'
    macro: gemma-4-64k-kv-q4-off-params
  - base_pattern: gemma-4-
    suffix: ' (128k q4 off limit)'
    macro: gemma-4-128k-kv-q4-off-params
  - base_pattern: gemma-4-
    suffix: ' (32k q8 on)'
    macro: gemma-4-32k-q8-on-params
  - base_pattern: glm-4.7/flash
    suffix: ' (thinking off)'
    macro: glm-47-thinking-off-params
  - base_pattern: r1-distill
    suffix: ' (Fast)'
    macro: ${deepseek-r1-params} ${inference-fast}
  - base_pattern: r1-distill-qwen-32b
    suffix: ' (short ctx)'
    macro: short-ctx-params
  - base_pattern: qwen3-30b/instruct-2507
    suffix: ' (with CPU)'
    macro: qwen-cpu-params
  - base_pattern: qwen3-30b/instruct-2507
    suffix: ' (short ctx)'
    macro: short-ctx-params
  - base_pattern: qwen3-next-80b
    suffix: ' (with CPU)'
    macro: qwen-cpu-params-big
  - base_pattern: qwen3-next-80b
    suffix: ' (thinking off)'
    macro: thinking-off-params
  - base_pattern: qwen3.5-35b
    suffix: ' (with CPU)'
    macro: qwen-cpu-params
  - base_pattern: qwen3.5-35b
    suffix: ' (short ctx)'
    macro: short-ctx-params
  - base_pattern: qwen3.5-35b
    suffix: ' (thinking off)'
    macro: thinking-off-params
  - base_pattern: swallow-70b/instruct
    suffix: ' (short ctx)'
    macro: short-ctx-params
