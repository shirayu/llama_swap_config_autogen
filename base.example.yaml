models:
  - /opt/data/llm/models
  # Expected layout under each directory:
  #   <model>/*.gguf
  #   <model>/<variant>/*.gguf
  # Any .gguf outside those depths will raise an error.

default_ttl: 300
healthCheckTimeout: 240
logLevel: warn
startPort: 9091
vram_estimation: true
captureBuffer: 0

# llama-swap official routing / groups (optional)
# groups:
#   default-group:
#     swap: true
#     exclusive: true
#     members:
#       - "deepseek-r1-distill-qwen-32b/distill:Q4_K_M"
#       - "glm-4.7/flash:Q4_K_M"

# llama-swap hooks (optional)
# hooks:
#   on_startup:
#     preload:
#       - "deepseek-r1-distill-qwen-32b/distill:Q4_K_M"

mmproj:
  enabled: true
  auto_attach: true
  arg: --mmproj
  generate_no_mmproj_variant: false
  no_mmproj_suffix: ' (no mmproj)'
  overrides: {}

model_labels:
  mmproj_default: ' 🌐'
  rules:
    - pattern:
        - qwen-vl
        - qwen3-vl
        - glm-4.6v
        - gemma-3
        - gemma-4
        - small-3.2
      label: ' 👁️'
      requires_mmproj: true
    - pattern: whisper
      label: ' 🎧'
    - pattern: kokoro
      label: ' 🔊'

macros:
  # Runtime
  binary: /app/llama-server

  # Shared parts: base
  common-base: --jinja --cache-type-k q8_0 --cache-type-v q8_0 --flash-attn on
  default-params: ${common-base} ${ngl:999} ${ctx:32768}
  reasoning-base: ${default-params} --reasoning-format none

  # Parameterized helpers
  ctx: --ctx-size ${1}
  ngl: --n-gpu-layers ${1}
  cpu-offload: --n-cpu-moe ${1} --threads ${2}

  # Shared parts: CPU offload / sampling / memory
  cpu-offload-ffn-full: -ot '.*.ffn_.*_exps.=CPU'
  cpu-offload-moe-max: --cpu-moe
  temp-reasoning: --temp 0.7 --top-p 0.9
  temp-coding: --temp 0.1
  low-memory: --no-mmap --mlock
  memory-efficient: --cache-type-k q4_0 --cache-type-v q4_0
  inference-fast: --batch-size 512 --ubatch-size 512

  # Presets
  deepseek-r1-params: ${reasoning-base} ${temp-reasoning}
  gemma-large-params: ${default-params} ${ngl:25} ${ctx:32768}
  gemma-4-32k-q8-on-params: ${common-base} ${ngl:999} ${ctx:32768}
  gemma-4-32k-q8-off-params: ${gemma-4-32k-q8-on-params} --reasoning off
  gemma-4-64k-kv-q4-off-params: ${common-base} ${ngl:999} ${ctx:65536} --cache-type-k q4_0 --cache-type-v q4_0 --reasoning off
  gemma-4-128k-kv-q4-off-params: ${common-base} ${ngl:999} ${ctx:131072} --cache-type-k q4_0 --cache-type-v q4_0 --reasoning off
  glm-47-params: ${default-params} --repeat-penalty 1.0 --temp 1.0
  gpt-oss-20b-params: ${reasoning-base} -c 0 -fa
  gpt-oss-120b-params: ${reasoning-base} ${ngl:13} --ctx-size 16384 --no-mmap
  qwen-context-large-params: ${default-params} ${ctx:65536}
  qwen-coder-params: ${default-params} ${temp-coding} ${ctx:32768}
  qwen-cpu-params: ${default-params} ${cpu-offload:12,16} ${ctx:65536}
  qwen-cpu-params-big: ${default-params} ${ngl:15} ${cpu-offload:12,16} ${ctx:65536}

  # Utility presets
  short-ctx-params: ${default-params} ${ctx:4096}
  long-context-params: ${default-params} ${ctx:65536}
  memory-constrained-params: ${default-params} ${low-memory} ${memory-efficient}
  thinking-off-params: ${default-params} --reasoning off
  glm-47-thinking-off-params: ${glm-47-params} --reasoning off

model_patterns:
  # Reasoning-focused models
  r1-distill-qwen-32b:
    macro: deepseek-r1-params
    fast-params: ${deepseek-r1-params} ${inference-fast}
    variants: [fast, short-ctx]

  gpt-oss-120b: gpt-oss-120b-params
  gpt-oss-20b: gpt-oss-20b-params

  # General-purpose large models
  qwen3-30b/instruct-2507:
    macro: qwen-context-large-params
    cpu-params: qwen-cpu-params
    variants: [cpu, short-ctx]

  gemma-3-27b:
    macro: gemma-large-params
    variants: [memory-efficient]

  gemma-3-27b/it-qat:
    macro: gemma-large-params
    variants: [memory-efficient, short-ctx]

  gemma-4-:
    macro: gemma-4-32k-q8-off-params
    emit_base: false
    variants: [gemma-4-variants]

  glm-4.7/flash:
    macro: glm-47-params
    thinking-off-params: glm-47-thinking-off-params
    variants: [thinking-off]

  qwen3-next-80b:
    macro: qwen-context-large-params
    cpu-params: qwen-cpu-params-big
    thinking-off-params: thinking-off-params
    variants: [cpu, thinking-off]

  qwen3.5-35b:
    macro: default-params
    cpu-params: qwen-cpu-params
    thinking-off-params: thinking-off-params
    variants: [cpu, short-ctx, thinking-off]

  swallow-70b/instruct:
    macro: default-params
    variants: [short-ctx]

  # Coding-focused models
  qwen3-30b/coder-instruct: qwen-coder-params
  StarCoder: qwen-coder-params

  # Lightweight models (for memory-constrained environments)
  Phi-3: memory-constrained-params
  TinyLlama: memory-constrained-params

variant_presets:
  cpu:
    - suffix: ' (with CPU)'
      macro: ${cpu-params}

  short-ctx:
    - suffix: ' (short ctx)'
      macro: short-ctx-params

  memory-efficient:
    - suffix: ' (Memory Efficient)'
      macro: memory-constrained-params

  fast:
    - suffix: ' (Fast)'
      macro: ${fast-params}

  thinking-off:
    - suffix: ' (thinking off)'
      macro: ${thinking-off-params}

  gemma-4-variants:
    - suffix: ' (32k q8 off)'
      macro: gemma-4-32k-q8-off-params
    - suffix: ' (64k q4 off)'
      macro: gemma-4-64k-kv-q4-off-params
    - suffix: ' (128k q4 off limit)'
      macro: gemma-4-128k-kv-q4-off-params
    - suffix: ' (32k q8 on)'
      macro: gemma-4-32k-q8-on-params
