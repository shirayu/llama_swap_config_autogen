# llama-swap-config-autogen configuration file
# Edit this file to match your environment

# List of directories where models are stored (required)
# Expected layout under each directory:
#   <model>/*.gguf
#   <model>/<variant>/*.gguf
# Any .gguf outside those depths will raise an error.
models:
  - /opt/llama.cpp/models
  # - /home/user/models  # Add additional directories if any

# Multimodal projector configuration (optional)
mmproj:
  enabled: true
  auto_attach: true
  arg: --mmproj
  generate_no_mmproj_variant: false
  no_mmproj_suffix: ' (no mmproj)'
  overrides: {}

# Display labels for model list (optional)
model_labels:
  mmproj_default: ' 🌐'
  rules:
    - pattern:
        - qwen-vl
        - qwen3-vl
        - glm-4.6v
        - gemma-3
        - gemma-4
        - small-3.2
      label: ' 👁️'
      requires_mmproj: true
    - pattern: whisper
      label: ' 🎧'
    - pattern: kokoro
      label: ' 🔊'

# Basic settings
default_ttl: 300              # Model lifetime (seconds)
healthCheckTimeout: 240       # Health check timeout (seconds)
logLevel: warn                # Log level (debug, info, warn, error)
startPort: 9091               # Starting port number

# llama-swap official routing / groups (optional)
# Controls model swapping behavior using official groups or matrix configs.
# groups:
#   default-group:
#     swap: true
#     exclusive: true
#     members:
#       - "your-model-id-1"
#       - "your-model-id-2"

# llama-swap hooks (optional)
# hooks:
#   on_startup:
#     preload:
#       - "your-model-id-1"

# macros: Reusable command templates
macros:
  # Base settings
  "binary": "/opt/llama.cpp/bin/llama-server"
  "default-params": "--log-disable --jinja --cache-type-k q8_0 --cache-type-v q8_0 --flash-attn on ${ngl:999} ${ctx:32768}"
  "reasoning-base": "${default-params} --reasoning-format none"

  # Parameterized helpers
  "ctx": "--ctx-size ${1}"
  "ngl": "--n-gpu-layers ${1}"
  "cpu-offload": "--n-cpu-moe ${1} --threads ${2}"

  # Common parts: CPU / sampling / memory / performance
  "cpu-offload-ffn-full": "-ot '.*.ffn_.*_exps.=CPU'"
  "cpu-offload-moe-max": "--cpu-moe"
  "temp-reasoning": "--temp 0.7 --top-p 0.9"
  "temp-coding": "--temp 0.1"
  "low-memory": "--no-mmap --mlock"
  "memory-efficient": "--cache-type-k q4_0 --cache-type-v q4_0"
  "inference-fast": "--batch-size 512 --ubatch-size 512"

  # Model-specific macros
  "gpt-oss-20b-params": "${reasoning-base} -c 0 -fa"
  "deepseek-r1-params": "${reasoning-base} ${temp-reasoning}"
  "gemma-large-params": "${default-params} ${ngl:25} ${ctx:32768}"
  "gpt-oss-120b-params": "${reasoning-base} ${ngl:13} --ctx-size 16384 --no-mmap"
  "qwen-coder-params": "${default-params} ${temp-coding} ${ctx:32768}"
  "qwen-cpu-params": "${default-params} ${cpu-offload:12,16} ${ctx:65536}"
  "qwen-context-large-params": "${default-params} ${ctx:65536}"

  # Presets
  "memory-constrained-params": "${default-params} ${low-memory} ${memory-efficient}"
  "long-context-params": "${default-params} ${ctx:65536}"

# Model name patterns and macro mapping
# Patterns are matched case-insensitively against the generated display name,
# which is the lowercased relative directory path such as:
#   qwen3-30b/instruct-2507
#   gemma-4-31b/it
model_patterns:
  # Reasoning-focused models
  "r1-distill":
    macro: "deepseek-r1-params"
    fast-params: "${deepseek-r1-params} ${inference-fast}"
    variants: [fast]

  "gpt-oss-120b": "gpt-oss-120b-params"
  "gpt-oss-20b": "gpt-oss-20b-params"

  # General-purpose large models
  "qwen3-30b/instruct-2507":
    macro: "qwen-context-large-params"
    cpu-params: "qwen-cpu-params"
    variants: [cpu]

  "gemma-3-27b":
    macro: "gemma-large-params"
    variants: [memory-efficient]

  # Coding-focused models
  "qwen3-30b/coder-instruct": "qwen-coder-params"
  "StarCoder": "qwen-coder-params"

  # Lightweight models (for memory-constrained environments)
  "Phi-3": "memory-constrained-params"
  "TinyLlama": "memory-constrained-params"

# Variant presets (optional)
# Defines templates for generating multiple variations of models.
variant_presets:
  cpu:
    - suffix: " (with CPU)"
      macro: "${cpu-params}"

  memory-efficient:
    - suffix: " (Memory Efficient)"
      macro: "memory-constrained-params"

  fast:
    - suffix: " (Fast)"
      macro: "${fast-params}"
